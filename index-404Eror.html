<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--<link rel="stylesheet" type="text/css" href="bootstrap-4.5.2-dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="bootstrap-4.5.2-dist/js/bootstrap.min.js">
    <link rel="stylesheet" type="text/css" href="jquery-3.5.1.min.js">
    <link rel="shortcut icon" href="S.png">-->
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background-color: #151729;
            height: 100vh;
        }

        .container {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #151729;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .container .content {
            max-width: 600px;
            text-align: center;
        }

        .container .content h2 {
            font-size: 18vw;
            color: #fff;
            line-height: 1em;
        }

        .container .content h4 {
            position: relative;
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #111;
            background: #fff;
            display: inline-block;
            padding: 10px 20px;
            font-weight: 300;
        }

        .container .content p {
            color: #fff;
            font-size: 1.2em;
        }

        .container .content a {
            position: relative;
            display: inline-block;
            color: #fff;
            background: #ff0562;
            margin-top: 20px;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 25px;
            border-bottom: 4px solid #d00d56;
        }

        
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h2>404</h2>
            <h4>Oops! Page not found</h4>
            <p>The page you were looking for doesn't exist.</p>
            <a href="#">Back to Home</a>
        </div>
    </div>
</body>
</html>
