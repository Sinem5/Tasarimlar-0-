<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: "Poppins";
            background-color: #1e1e1e;
        }
        .center{
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .card{
            margin: 4px;
            margin-top: 50px;
            display: flex;
            position: relative;
            height: 400px;
            width: 300px;
            border-radius: 0.3rem;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.322);
            transition: 0.5s ease-out;
            background: -webkit-linear-gradient(top left, #00c6ff, #0072ff);
            cursor: pointer;
            background-color: aqua;
        }
        .card:hover{
            transform: translateX(-20px);
        }
    </style>
</head>
<body>
    <div class="center">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>
</body>
</html>
